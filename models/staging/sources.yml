version: 2

sources:
  - name: ecommerce_raw
    database: ECOMMERCE_DB
    schema: RAW

    tables:
      - name: RAW_CUSTOMERS
      - name: RAW_PRODUCTS
      - name: RAW_ORDERS
      - name: RAW_PAYMENTS

models:
  - name: stg_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null

  - name: stg_products
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null

      - name: customer_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id

  - name: stg_payments
    columns:
      - name: payment_id
        tests:
          - unique
          - not_null

      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id